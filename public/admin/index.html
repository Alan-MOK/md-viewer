<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MD Viewer - 管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Login Overlay ===== */
    #login-overlay {
      position: fixed; inset: 0;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    #login-overlay.hidden { display: none; }

    .login-box {
      background: #fff;
      border-radius: 10px;
      padding: 2.5rem 2rem;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .login-box h2 {
      font-size: 1.3rem;
      color: #111;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .login-box label {
      display: block;
      font-size: .85rem;
      color: #555;
      margin-bottom: .3rem;
    }

    .login-box input {
      width: 100%;
      padding: .6rem .85rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: .95rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .login-box input:focus { border-color: #4f6ef2; }

    .login-box button {
      width: 100%;
      padding: .7rem;
      background: #4f6ef2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }

    .login-box button:hover { background: #3a5ae0; }

    #login-error {
      color: #e53e3e;
      font-size: .85rem;
      margin-top: .75rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ===== Main Layout ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #app.hidden { display: none; }

    /* Top bar */
    .topbar {
      background: #1a1a2e;
      color: #fff;
      padding: 0 1.25rem;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar .brand {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .topbar .topbar-right {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .85rem;
    }

    .topbar .topbar-right a {
      color: #aaa;
      text-decoration: none;
      cursor: pointer;
    }

    .topbar .topbar-right a:hover { color: #fff; }

    /* Three columns */
    .columns {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left column - document list */
    .col-list {
      width: 240px;
      background: #fff;
      border-right: 1px solid #e4e4e4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .col-list-header {
      padding: .85rem 1rem;
      border-bottom: 1px solid #e4e4e4;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    #btn-new {
      padding: .5rem;
      background: #4f6ef2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      cursor: pointer;
      font-weight: 500;
      transition: background .2s;
    }

    #btn-new:hover { background: #3a5ae0; }

    #search {
      padding: .4rem .7rem;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: .85rem;
      outline: none;
      width: 100%;
    }

    #search:focus { border-color: #4f6ef2; }

    #doc-list {
      overflow-y: auto;
      flex: 1;
    }

    .doc-item {
      padding: .7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background .15s;
    }

    .doc-item:hover { background: #f5f7ff; }
    .doc-item.active { background: #eef1ff; border-left: 3px solid #4f6ef2; }

    .doc-item-title {
      font-size: .88rem;
      font-weight: 500;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-item-date {
      font-size: .75rem;
      color: #999;
      margin-top: .15rem;
    }

    .list-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: #aaa;
      font-size: .875rem;
    }

    /* Middle column - editor */
    .col-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid #e4e4e4;
    }

    .editor-toolbar {
      padding: .6rem 1rem;
      background: #fafafa;
      border-bottom: 1px solid #e4e4e4;
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-shrink: 0;
    }

    .editor-toolbar input[type="text"] {
      flex: 1;
      padding: .4rem .75rem;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: .9rem;
      outline: none;
    }

    .editor-toolbar input[type="text"]:focus { border-color: #4f6ef2; }

    #btn-save {
      padding: .4rem 1rem;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: .875rem;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
      transition: background .2s;
    }

    #btn-save:hover { background: #16a34a; }
    #btn-save:disabled { background: #aaa; cursor: not-allowed; }

    #btn-delete {
      padding: .4rem .8rem;
      background: #fff;
      color: #e53e3e;
      border: 1px solid #e53e3e;
      border-radius: 5px;
      font-size: .875rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, color .2s;
    }

    #btn-delete:hover { background: #e53e3e; color: #fff; }
    #btn-delete:disabled { opacity: .4; cursor: not-allowed; }

    .editor-url {
      padding: .35rem 1rem;
      background: #f0f4ff;
      border-bottom: 1px solid #e4e4e4;
      font-size: .78rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-shrink: 0;
      min-height: 30px;
    }

    .editor-url a { color: #4f6ef2; text-decoration: none; }
    .editor-url a:hover { text-decoration: underline; }

    #btn-copy-url {
      padding: .15rem .5rem;
      background: #4f6ef2;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: .72rem;
      cursor: pointer;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 1.25rem;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: .875rem;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
    }

    /* Right column - preview */
    .col-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #fff;
    }

    .preview-header {
      padding: .6rem 1rem;
      background: #fafafa;
      border-bottom: 1px solid #e4e4e4;
      font-size: .8rem;
      color: #888;
      font-weight: 500;
      flex-shrink: 0;
    }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
    }

    /* Preview markdown styles */
    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      margin: 1.5rem 0 .6rem;
      font-weight: 600;
      line-height: 1.35;
      color: #111;
    }

    #preview h1 { font-size: 1.6rem; border-bottom: 2px solid #eee; padding-bottom: .35rem; }
    #preview h2 { font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: .25rem; }
    #preview h3 { font-size: 1.1rem; }

    #preview p { margin: 0 0 1rem; line-height: 1.75; }

    #preview a { color: #2563eb; }

    #preview ul, #preview ol {
      padding-left: 1.6rem;
      margin: 0 0 1rem;
    }

    #preview li { margin-bottom: .25rem; }

    #preview blockquote {
      margin: 1rem 0;
      padding: .6rem 1rem;
      border-left: 4px solid #d0d7de;
      background: #f6f8fa;
      color: #555;
      border-radius: 0 4px 4px 0;
    }

    #preview blockquote p { margin: 0; }

    #preview code {
      font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
      font-size: .85em;
      background: #f0f0f2;
      padding: .15em .4em;
      border-radius: 3px;
      color: #d63384;
    }

    #preview pre {
      background: #1e1e2e;
      border-radius: 6px;
      padding: 1rem 1.2rem;
      overflow-x: auto;
      margin: 0 0 1rem;
    }

    #preview pre code {
      background: none;
      padding: 0;
      color: #cdd6f4;
      font-size: .85rem;
    }

    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    #preview th, #preview td {
      border: 1px solid #d8d8d8;
      padding: .45rem .8rem;
      text-align: left;
    }

    #preview th { background: #f3f4f6; font-weight: 600; }

    #preview img { max-width: 100%; border-radius: 4px; }

    #preview hr { border: none; border-top: 2px solid #eee; margin: 1.5rem 0; }

    /* Status bar */
    #status-bar {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .5rem 1rem;
      border-radius: 6px;
      font-size: .85rem;
      color: #fff;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    #status-bar.show { opacity: 1; }
    #status-bar.success { background: #22c55e; }
    #status-bar.error   { background: #e53e3e; }
  </style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>MD Viewer 管理后台</h2>
    <label>用户名</label>
    <input type="text" id="login-username" placeholder="admin" autocomplete="username">
    <label>密码</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <button id="login-btn">登录</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">
  <div class="topbar">
    <span class="brand">MD Viewer 管理后台</span>
    <div class="topbar-right">
      <span id="admin-name"></span>
      <a id="btn-logout">退出登录</a>
    </div>
  </div>

  <div class="columns">
    <!-- Left: document list -->
    <div class="col-list">
      <div class="col-list-header">
        <button id="btn-new">+ 新建文档</button>
        <input type="text" id="search" placeholder="搜索文档...">
      </div>
      <div id="doc-list">
        <div class="list-empty">暂无文档</div>
      </div>
    </div>

    <!-- Middle: editor -->
    <div class="col-editor">
      <div class="editor-toolbar">
        <input type="text" id="title-input" placeholder="文档标题">
        <button id="btn-save">保存</button>
        <button id="btn-delete" disabled>删除</button>
      </div>
      <div class="editor-url" id="doc-url-bar" style="display:none">
        访问地址：<a id="doc-url-link" href="#" target="_blank"></a>
        <button id="btn-copy-url">复制</button>
      </div>
      <textarea id="editor" placeholder="在此输入 Markdown 内容...&#10;&#10;例如：&#10;# 标题&#10;&#10;正文内容..."></textarea>
    </div>

    <!-- Right: preview -->
    <div class="col-preview">
      <div class="preview-header">实时预览</div>
      <div id="preview"></div>
    </div>
  </div>
</div>

<div id="status-bar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script>
(function () {
  // ===== State =====
  let token = localStorage.getItem('md_token');
  let docs = [];
  let currentDocId = null;
  let currentSlug = null;
  let previewDebounce = null;

  // ===== DOM refs =====
  const loginOverlay   = document.getElementById('login-overlay');
  const loginUsername  = document.getElementById('login-username');
  const loginPassword  = document.getElementById('login-password');
  const loginBtn       = document.getElementById('login-btn');
  const loginError     = document.getElementById('login-error');
  const app            = document.getElementById('app');
  const adminName      = document.getElementById('admin-name');
  const btnLogout      = document.getElementById('btn-logout');
  const btnNew         = document.getElementById('btn-new');
  const searchInput    = document.getElementById('search');
  const docList        = document.getElementById('doc-list');
  const titleInput     = document.getElementById('title-input');
  const editor         = document.getElementById('editor');
  const preview        = document.getElementById('preview');
  const btnSave        = document.getElementById('btn-save');
  const btnDelete      = document.getElementById('btn-delete');
  const docUrlBar      = document.getElementById('doc-url-bar');
  const docUrlLink     = document.getElementById('doc-url-link');
  const btnCopyUrl     = document.getElementById('btn-copy-url');
  const statusBar      = document.getElementById('status-bar');

  // ===== Helpers =====
  function showStatus(msg, type) {
    statusBar.textContent = msg;
    statusBar.className = 'show ' + type;
    clearTimeout(statusBar._t);
    statusBar._t = setTimeout(() => { statusBar.className = ''; }, 2500);
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  async function apiFetch(url, opts) {
    const res = await fetch(url, { headers: authHeaders(), ...opts });
    if (res.status === 401) { doLogout(); return null; }
    return res;
  }

  function formatDate(dt) {
    return new Date(dt).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
  }

  function renderPreview() {
    const md = editor.value;
    preview.innerHTML = marked.parse(md || '');
  }

  // ===== Auth =====
  function tryAutoLogin() {
    if (!token) { showLogin(); return; }
    // Verify token by fetching docs
    fetch('/api/docs', { headers: authHeaders() }).then(r => {
      if (r.status === 401) { token = null; localStorage.removeItem('md_token'); showLogin(); }
      else { showApp(); }
    });
  }

  function showLogin() {
    loginOverlay.classList.remove('hidden');
    app.classList.add('hidden');
    loginError.textContent = '';
    loginUsername.focus();
  }

  function showApp() {
    loginOverlay.classList.add('hidden');
    app.classList.remove('hidden');
    // Decode username from JWT payload (middle base64 part)
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      adminName.textContent = payload.username;
    } catch {}
    loadDocs();
  }

  loginBtn.addEventListener('click', doLogin);
  loginPassword.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const username = loginUsername.value.trim();
    const password = loginPassword.value;
    loginError.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = '登录中...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        loginError.textContent = data.error || '登录失败';
      } else {
        token = data.token;
        localStorage.setItem('md_token', token);
        showApp();
      }
    } catch {
      loginError.textContent = '网络错误，请重试';
    }
    loginBtn.disabled = false;
    loginBtn.textContent = '登录';
  }

  btnLogout.addEventListener('click', doLogout);

  function doLogout() {
    token = null;
    localStorage.removeItem('md_token');
    showLogin();
  }

  // ===== Document List =====
  async function loadDocs() {
    const res = await apiFetch('/api/docs');
    if (!res) return;
    docs = await res.json();
    renderList(docs);
  }

  function renderList(list) {
    if (!list.length) {
      docList.innerHTML = '<div class="list-empty">暂无文档</div>';
      return;
    }
    docList.innerHTML = list.map(d => `
      <div class="doc-item${d.id === currentDocId ? ' active' : ''}" data-id="${d.id}">
        <div class="doc-item-title" title="${escHtml(d.title)}">${escHtml(d.title)}</div>
        <div class="doc-item-date">${formatDate(d.updated_at)}</div>
      </div>
    `).join('');
    docList.querySelectorAll('.doc-item').forEach(el => {
      el.addEventListener('click', () => loadDoc(parseInt(el.dataset.id)));
    });
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    renderList(docs.filter(d => d.title.toLowerCase().includes(q)));
  });

  // ===== Load / Edit Doc =====
  async function loadDoc(id) {
    const res = await apiFetch('/api/docs/' + id);
    if (!res) return;
    const doc = await res.json();
    currentDocId = doc.id;
    currentSlug = doc.slug;
    titleInput.value = doc.title;
    editor.value = doc.content;
    renderPreview();
    setDocUrl(doc.slug);
    btnDelete.disabled = false;
    // Highlight active item
    docList.querySelectorAll('.doc-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.id) === id);
    });
  }

  function setDocUrl(slug) {
    const url = window.location.origin + '/docs/' + slug;
    docUrlLink.textContent = url;
    docUrlLink.href = url;
    docUrlBar.style.display = 'flex';
  }

  function clearEditor() {
    currentDocId = null;
    currentSlug = null;
    titleInput.value = '';
    editor.value = '';
    preview.innerHTML = '';
    docUrlBar.style.display = 'none';
    btnDelete.disabled = true;
    docList.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
  }

  btnNew.addEventListener('click', () => {
    clearEditor();
    titleInput.focus();
  });

  // ===== Editor → Preview =====
  editor.addEventListener('input', () => {
    clearTimeout(previewDebounce);
    previewDebounce = setTimeout(renderPreview, 300);
  });

  // ===== Save =====
  btnSave.addEventListener('click', saveDoc);

  async function saveDoc() {
    const title = titleInput.value.trim();
    const content = editor.value;
    if (!title) { showStatus('请输入文档标题', 'error'); titleInput.focus(); return; }

    btnSave.disabled = true;
    btnSave.textContent = '保存中...';

    try {
      let res, data;
      if (currentDocId) {
        // Update
        res = await apiFetch('/api/docs/' + currentDocId, {
          method: 'PUT',
          body: JSON.stringify({ title, content }),
        });
      } else {
        // Create
        res = await apiFetch('/api/docs', {
          method: 'POST',
          body: JSON.stringify({ title, content }),
        });
      }

      if (!res) return;
      data = await res.json();

      if (!res.ok) {
        showStatus(data.error || '保存失败', 'error');
      } else {
        if (!currentDocId) {
          currentDocId = data.id;
          currentSlug = data.slug;
          setDocUrl(data.slug);
          btnDelete.disabled = false;
        }
        showStatus('保存成功', 'success');
        await loadDocs();
        // Re-highlight active item
        docList.querySelectorAll('.doc-item').forEach(el => {
          el.classList.toggle('active', parseInt(el.dataset.id) === currentDocId);
        });
      }
    } catch {
      showStatus('网络错误', 'error');
    }

    btnSave.disabled = false;
    btnSave.textContent = '保存';
  }

  // ===== Delete =====
  btnDelete.addEventListener('click', async () => {
    if (!currentDocId) return;
    if (!confirm('确认删除此文档？此操作不可恢复。')) return;

    const res = await apiFetch('/api/docs/' + currentDocId, { method: 'DELETE' });
    if (!res) return;
    const data = await res.json();
    if (res.ok) {
      showStatus('文档已删除', 'success');
      clearEditor();
      await loadDocs();
    } else {
      showStatus(data.error || '删除失败', 'error');
    }
  });

  // ===== Copy URL =====
  btnCopyUrl.addEventListener('click', () => {
    const url = docUrlLink.href;
    navigator.clipboard.writeText(url).then(() => showStatus('链接已复制', 'success'));
  });

  // ===== Keyboard shortcut: Cmd/Ctrl+S =====
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      if (!app.classList.contains('hidden')) saveDoc();
    }
  });

  // ===== Escape HTML =====
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== Boot =====
  tryAutoLogin();
})();
</script>
</body>
</html>
