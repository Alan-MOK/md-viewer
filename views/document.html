<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link id="doc-css" rel="stylesheet" href="/doc.css">
  <script>
    (function(){
      try {
        const parts = location.pathname.split('/');
        const base = parts.length > 1 ? '/' + (parts[1] || '') : '';
        if (base && base !== '/') {
          const link = document.getElementById('doc-css');
          if (link && link.getAttribute('href').startsWith('/')) {
            link.setAttribute('href', base + link.getAttribute('href'));
          }
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <header class="page-header">
    <div style="max-width:780px;margin:0 auto;">
      <h1>{{TITLE}}</h1>
      <div class="page-meta">
        <span>发布于 {{CREATED_AT}}</span>
        <span>最后更新 {{UPDATED_AT}}</span>
      </div>
    </div>
  </header>

  <main class="document-body">
    {{CONTENT}}
  </main>

  <script>
    // Wrap tables for horizontal scroll on mobile
    document.querySelectorAll('table').forEach(function(table) {
      var wrapper = document.createElement('div');
      wrapper.className = 'table-wrapper';
      table.parentNode.insertBefore(wrapper, table);
      wrapper.appendChild(table);
    });
  </script>

</body>
</html>
